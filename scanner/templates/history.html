<!DOCTYPE html>
<html>
<head>
    <title>Cyber AI Control Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            background: #050816;
            color: white;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .dashboard {
            padding: 30px;
        }

        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        h2 {
            text-shadow: 0 0 12px #00d4ff;
        }

        #istClock {
            color: #00d4ff;
            font-size: 16px;
            margin-bottom: 10px;
        }

        #scanCount {
            color: #00d4ff;
            font-weight: bold;
        }

        .btn-voice {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div id="particles-js"></div>

<div class="dashboard">

    <h2>🛡️ AI Cyber Security Control Room</h2>

    <!-- 🔙 BACK BUTTON (ADDED ONLY) -->
    <a href="/scanner/" class="btn btn-light mb-3">⬅ Back</a>

    <!-- 🇮🇳 INDIA TIME -->
    <div id="istClock">Loading IST...</div>

    <!-- 🔊 ENABLE VOICE BUTTON -->
    <button class="btn btn-info btn-voice" onclick="enableVoice()">
        🔊 Enable AI Voice
    </button>

    <div class="panel">
        <h5>📊 Live Risk Monitoring</h5>
        <canvas id="riskChart"></canvas>
    </div>

    <div class="panel">
        <h5>📡 Live Stats</h5>
        Total Scans: <span id="scanCount">0</span>
    </div>

    <div class="panel">
        <h5>📜 Scan History</h5>

        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Risk</th>
                    <th>Level</th>
                </tr>
            </thead>

            <tbody>
                {% for s in scans %}
                <tr>
                    <td>{{ s.id }}</td>
                    <td>{{ s.risk }}%</td>
                    <td>{{ s.level }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<script>

/* =========================
   PARTICLES
========================= */

particlesJS("particles-js", {
    particles: {
        number: { value: 50 },
        color: { value: "#00d4ff" },
        shape: { type: "circle" },
        opacity: { value: 0.4 },
        size: { value: 3 },
        line_linked: { enable: true, color: "#00d4ff" },
        move: { enable: true, speed: 2 }
    }
});

/* =========================
   🇮🇳 IST CLOCK
========================= */

function updateIST() {
    let now = new Date();

    let options = {
        timeZone: "Asia/Kolkata",
        weekday: "long",
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
    };

    document.getElementById("istClock").innerHTML =
        "🇮🇳 India Time (IST): " + now.toLocaleString("en-IN", options);
}

setInterval(updateIST, 1000);
updateIST();

/* =========================
   🔊 AI VOICE SYSTEM
========================= */

let voiceEnabled = false;
let voicesList = [];

function loadVoices() {
    voicesList = speechSynthesis.getVoices();
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function enableVoice() {
    voiceEnabled = true;

    let msg = new SpeechSynthesisUtterance("AI voice system activated");
    msg.voice = voicesList.find(v => v.lang.includes("en")) || voicesList[0];
    msg.rate = 1;
    msg.pitch = 1;

    speechSynthesis.speak(msg);
}

function speak(text) {
    if (!voiceEnabled) return;

    let msg = new SpeechSynthesisUtterance(text);
    msg.voice = voicesList.find(v => v.lang.includes("en")) || voicesList[0];
    msg.rate = 1;
    msg.pitch = 1;

    speechSynthesis.speak(msg);
}

/* =========================
   CHART
========================= */

let ctx = document.getElementById("riskChart").getContext("2d");

let riskChart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Risk %",
            data: [],
            borderColor: "#00d4ff",
            backgroundColor: "rgba(0,212,255,0.2)",
            fill: true,
            tension: 0.4
        }]
    }
});

/* =========================
   LIVE DJANGO DATA
========================= */

let lastCount = 0;

async function loadLiveData() {
    let res = await fetch("/scan-api/");
    let data = await res.json();

    riskChart.data.labels = data.labels;
    riskChart.data.datasets[0].data = data.risk;
    riskChart.update();

    document.getElementById("scanCount").innerText = data.count;

    if (data.count > lastCount) {
        speak("New scan detected. Total scans " + data.count);
    }

    if (data.risk && data.risk.length > 0) {
        let latest = data.risk[data.risk.length - 1];

        if (latest >= 70) {
            speak("Warning. High risk detected.");
        }
        else if (latest >= 40) {
            speak("Medium risk detected.");
        }
    }

    lastCount = data.count;
}

setInterval(loadLiveData, 2000);
loadLiveData();

</script>

</body>
</html>
